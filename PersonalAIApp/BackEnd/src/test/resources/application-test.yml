# ============================================================
# AI Chat 后端测试配置
# 使用 H2 内存数据库替代 MySQL，Mock 替代 Redis
# ============================================================

server:
  port: 8080

spring:
  application:
    name: ai-chat-backend-test

  # H2 内存数据库（MySQL 兼容模式）
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  # JPA 自动建表（create-drop：测试结束后删除表）
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  # Redis 在测试中全部 Mock，不连接真实 Redis
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

  # Jackson 序列化
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# Ollama 配置（测试中由 MockWebServer 模拟）
ollama:
  base-url: http://localhost:9999
  chat-timeout: 5000

# 应用业务配置
app:
  auth:
    api-key: test-api-key
  chat:
    max-context-rounds: 5
    max-session-messages: 100
    session-expire-days: 30

# 日志
logging:
  level:
    com.aiapp: DEBUG
    org.springframework.web: INFO